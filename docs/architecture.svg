<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C2D12"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="480" fill="url(#bgGrad)" rx="14"/>

  <!-- Header -->
  <rect x="0" y="0" width="920" height="70" fill="url(#orangeGrad)" rx="14"/>
  <rect x="0" y="56" width="920" height="14" fill="url(#orangeGrad)"/>
  <circle cx="46" cy="35" r="22" fill="#7C2D12"/>
  <text x="46" y="41" text-anchor="middle" fill="#F5E6CC" font-size="14" font-weight="bold">BIA</text>
  <text x="80" y="28" fill="#FFFFFF" font-size="17" font-weight="bold">moore-dataset-gen</text>
  <text x="80" y="50" fill="#F5E6CC" font-size="11">Pipeline audio Mooré — YouTube → HuggingFace Dataset</text>

  <!-- Status badge -->
  <rect x="720" y="15" width="180" height="40" rx="6" fill="#7C2D12"/>
  <text x="810" y="31" text-anchor="middle" fill="#F5E6CC" font-size="10">🔄 64 / 247 transcrites</text>
  <text x="810" y="47" text-anchor="middle" fill="#FB923C" font-size="10">183 restantes (~6h GPU)</text>

  <!-- ── STEP 1: YouTube ── -->
  <rect x="25" y="100" width="130" height="58" rx="8" fill="#7C2D12" stroke="#F97316" stroke-width="1.5"/>
  <text x="90" y="122" text-anchor="middle" fill="#F97316" font-size="11" font-weight="bold">YouTube</text>
  <text x="90" y="138" text-anchor="middle" fill="#F5E6CC" font-size="9">Playlist SID BI ZÉRÉ</text>
  <text x="90" y="151" text-anchor="middle" fill="#FB923C" font-size="9">247 vidéos · SAVANE TV</text>

  <!-- arrow -->
  <line x1="155" y1="129" x2="195" y2="129" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="175" y="122" text-anchor="middle" fill="#FB923C" font-size="9">yt-dlp</text>

  <!-- ── STEP 2: Downloader ── -->
  <rect x="195" y="100" width="135" height="58" rx="8" fill="#7C2D12" stroke="#F97316" stroke-width="1.5"/>
  <text x="263" y="122" text-anchor="middle" fill="#F97316" font-size="11" font-weight="bold">downloader.py</text>
  <text x="263" y="138" text-anchor="middle" fill="#F5E6CC" font-size="9">Téléchargement audio</text>
  <text x="263" y="151" text-anchor="middle" fill="#FB923C" font-size="9">max_workers=3 · WAV</text>

  <!-- arrow -->
  <line x1="330" y1="129" x2="365" y2="129" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── STEP 3: Segmenter ── -->
  <rect x="365" y="100" width="135" height="58" rx="8" fill="#7C2D12" stroke="#F97316" stroke-width="1.5"/>
  <text x="433" y="122" text-anchor="middle" fill="#F97316" font-size="11" font-weight="bold">segmenter.py</text>
  <text x="433" y="138" text-anchor="middle" fill="#F5E6CC" font-size="9">Silero VAD</text>
  <text x="433" y="151" text-anchor="middle" fill="#FB923C" font-size="9">5–10s · FLAC · multiprocess</text>

  <!-- arrow -->
  <line x1="500" y1="129" x2="535" y2="129" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── S3 Chunks ── -->
  <rect x="535" y="100" width="145" height="58" rx="8" fill="#431407" stroke="#FB923C" stroke-width="1.5"/>
  <text x="608" y="122" text-anchor="middle" fill="#FB923C" font-size="11" font-weight="bold">S3 Tigris</text>
  <text x="608" y="137" text-anchor="middle" fill="#F5E6CC" font-size="9">burkimbia/</text>
  <text x="608" y="150" text-anchor="middle" fill="#F5E6CC" font-size="9">sidbi-ziri/chunks/{vid}/*.flac</text>

  <!-- chunk_pipeline bracket -->
  <rect x="20" y="86" width="665" height="82" rx="5" fill="none" stroke="#F97316" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>
  <text x="352" y="83" text-anchor="middle" fill="#FB923C" font-size="9" opacity="0.8">chunk_pipeline.py — marker-based resume</text>

  <!-- ── Arrow S3 → Transcriber ── -->
  <line x1="608" y1="158" x2="608" y2="205" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Transcriber ── -->
  <rect x="490" y="205" width="235" height="80" rx="8" fill="#431407" stroke="#EA580C" stroke-width="2"/>
  <text x="608" y="228" text-anchor="middle" fill="#EA580C" font-size="11" font-weight="bold">transcriber.py</text>
  <text x="608" y="244" text-anchor="middle" fill="#F5E6CC" font-size="9">BIA-WHISPER-LARGE-SACHI_V2</text>
  <text x="608" y="259" text-anchor="middle" fill="#F5E6CC" font-size="9">CUDA · greedy (num_beams=1)</text>
  <text x="608" y="273" text-anchor="middle" fill="#FB923C" font-size="9">batch_size=8 · max_new_tokens=444</text>

  <!-- transcribe_pipeline bracket -->
  <rect x="485" y="158" width="400" height="135" rx="5" fill="none" stroke="#F97316" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.4"/>
  <text x="684" y="155" text-anchor="middle" fill="#FB923C" font-size="9" opacity="0.8">transcribe_pipeline.py — video par video</text>

  <!-- arrow Transcriber → S3 transcripts -->
  <line x1="725" y1="245" x2="760" y2="245" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── S3 Transcripts ── -->
  <rect x="760" y="205" width="145" height="80" rx="8" fill="#431407" stroke="#FB923C" stroke-width="1.5"/>
  <text x="833" y="228" text-anchor="middle" fill="#FB923C" font-size="11" font-weight="bold">S3 Tigris</text>
  <text x="833" y="244" text-anchor="middle" fill="#F5E6CC" font-size="9">sidbi-ziri/</text>
  <text x="833" y="259" text-anchor="middle" fill="#F5E6CC" font-size="9">transcripts/</text>
  <text x="833" y="273" text-anchor="middle" fill="#F5E6CC" font-size="9">{vid_id}.jsonl</text>

  <!-- arrow S3 transcripts → create_dataset -->
  <line x1="833" y1="285" x2="833" y2="335" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── create_dataset ── -->
  <rect x="680" y="335" width="210" height="60" rx="8" fill="#7C2D12" stroke="#F97316" stroke-width="1.5"/>
  <text x="785" y="358" text-anchor="middle" fill="#F97316" font-size="11" font-weight="bold">create_dataset.py</text>
  <text x="785" y="374" text-anchor="middle" fill="#F5E6CC" font-size="9">transcripts + chunks → HF Dataset</text>
  <text x="785" y="388" text-anchor="middle" fill="#FB923C" font-size="9">push_to_hub</text>

  <!-- arrow create_dataset → HF -->
  <line x1="680" y1="365" x2="575" y2="365" stroke="#F97316" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── HuggingFace ── -->
  <rect x="390" y="335" width="185" height="60" rx="8" fill="url(#orangeGrad)"/>
  <text x="483" y="358" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold">HuggingFace Hub</text>
  <text x="483" y="374" text-anchor="middle" fill="#F5E6CC" font-size="9">sawadogosalif/</text>
  <text x="483" y="388" text-anchor="middle" fill="#F5E6CC" font-size="9">sidbi-ziri-dataset</text>

  <!-- dashed line: chunks also go to create_dataset -->
  <line x1="608" y1="285" x2="608" y2="320" stroke="#F5E6CC" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="608" y1="320" x2="785" y2="320" stroke="#F5E6CC" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="785" y1="320" x2="785" y2="335" stroke="#F5E6CC" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5" marker-end="url(#arr)"/>

  <!-- arrow HF → bia-sparktts -->
  <line x1="390" y1="365" x2="290" y2="365" stroke="#F5E6CC" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- ── bia-sparktts ── -->
  <rect x="25" y="335" width="265" height="60" rx="8" fill="#7C2D12" stroke="#F5E6CC" stroke-width="1"/>
  <text x="158" y="358" text-anchor="middle" fill="#F5E6CC" font-size="10" font-weight="bold">bia-sparktts</text>
  <text x="158" y="374" text-anchor="middle" fill="#FB923C" font-size="9">BiCodec tokenisation → fine-tuning SparkTTS</text>
  <text x="158" y="388" text-anchor="middle" fill="#F5E6CC" font-size="9">+ moore-speech-bibleJW + Sachi_demo_dataset</text>

  <!-- Footer -->
  <rect x="0" y="448" width="920" height="32" fill="#431407" rx="0"/>
  <rect x="0" y="448" width="920" height="32" fill="#431407"/>
  <rect x="0" y="460" width="920" height="20" fill="#431407" rx="14"/>
  <text x="460" y="469" text-anchor="middle" fill="#FB923C" font-size="9">BurkimbIA · Intelligence Artificielle pour le Burkina Faso · burkimbia.com</text>

</svg>
